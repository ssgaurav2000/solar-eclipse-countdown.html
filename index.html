<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Solar Eclipse 2026 Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #e8a838;
    --corona: #f5c842;
    --ember: #c0440a;
    --dark: #040608;
    --text: #d8cfc4;
    --dim: #7a6f62;
  }

  html, body {
    width: 100%;
    overflow-x: hidden;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px 40px;
    position: relative;
  }

  canvas#stars {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ECLIPSE */
  .eclipse-wrap {
    position: relative;
    z-index: 2;
    margin-bottom: 28px;
  }

  .corona {
    width: clamp(110px, 32vw, 180px);
    height: clamp(110px, 32vw, 180px);
    position: relative;
    margin: 0 auto;
  }

  .corona-ring {
    position: absolute;
    border-radius: 50%;
    animation: pulse-ring 3s ease-in-out infinite;
  }
  .corona-ring:nth-child(1) { inset: -40px; background: radial-gradient(circle, transparent 48%, rgba(232,168,56,0.08) 60%, transparent 75%); }
  .corona-ring:nth-child(2) { inset: -20px; background: radial-gradient(circle, transparent 50%, rgba(240,180,60,0.14) 62%, transparent 78%); animation-delay:.4s; }
  .corona-ring:nth-child(3) { inset: -6px;  background: radial-gradient(circle, transparent 52%, rgba(245,200,66,0.22) 64%, transparent 80%); animation-delay:.8s; }

  .sun-body {
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 40% 38%, #fde97a 0%, #f5c842 20%, #e8a838 45%, #c0440a 70%, #6b1c04 90%);
    box-shadow: 0 0 60px 20px rgba(232,168,56,0.4), 0 0 120px 40px rgba(192,68,10,0.2);
    animation: breathe 4s ease-in-out infinite;
  }

  .moon-body {
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 55% 45%, #1a1e24 0%, #0a0d12 40%, #040608 100%);
    transform: translate(4px,-4px);
    animation: slide-in 2.4s cubic-bezier(0.16,1,0.3,1) forwards;
    box-shadow: -8px 8px 40px rgba(0,0,0,0.9);
  }

  .crescent-glow {
    position: absolute; inset: -2px; border-radius: 50%;
    box-shadow: inset 6px -6px 18px rgba(232,168,56,0.25);
    animation: slide-in 2.4s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  @keyframes slide-in { 0%{transform:translate(60px,-60px);opacity:0} 100%{transform:translate(4px,-4px);opacity:1} }
  @keyframes breathe  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
  @keyframes pulse-ring { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }

  /* HEADER */
  .header {
    position: relative; z-index: 2;
    text-align: center; margin-bottom: 10px;
    animation: fade-up 1s ease 0.3s both; width: 100%;
  }

  .label-top {
    font-size: clamp(10px,3vw,13px);
    letter-spacing: 5px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 6px; opacity: 0.8;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px,17vw,90px);
    letter-spacing: 6px; line-height: 1;
    background: linear-gradient(180deg,#fff5dc 0%,#e8a838 50%,#c0440a 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .subtitle {
    font-size: clamp(10px,2.8vw,14px); letter-spacing: 2px;
    color: var(--dim); margin-top: 4px; text-transform: uppercase;
  }

  /* COUNTDOWN */
  .countdown {
    position: relative; z-index: 2;
    display: flex; gap: clamp(4px,2vw,24px);
    align-items: flex-start; justify-content: center;
    width: 100%; margin-top: 8px;
    animation: fade-up 1s ease 0.7s both;
  }

  .unit {
    display: flex; flex-direction: column; align-items: center;
    flex: 1; max-width: 80px;
  }

  .unit-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px,14vw,90px);
    line-height: 1; color: #fff;
    text-shadow: 0 0 40px rgba(232,168,56,0.5);
    transition: color 0.15s ease;
    width: 100%; text-align: center;
  }

  .unit-value.tick { color: var(--gold); }

  .unit-label {
    font-size: clamp(8px,2.5vw,10px); letter-spacing: 3px;
    text-transform: uppercase; color: var(--dim); margin-top: 4px;
  }

  .separator {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px,14vw,90px);
    color: var(--ember); opacity: 0.5; line-height: 1;
    flex-shrink: 0;
    animation: blink 1s step-start infinite;
  }

  @keyframes blink { 0%,100%{opacity:.5} 50%{opacity:.15} }

  /* PATH INFO */
  .path-info {
    position: relative; z-index: 2;
    margin-top: 24px; text-align: center;
    width: 100%; animation: fade-up 1s ease 0.9s both;
  }

  .path-row {
    display: flex; justify-content: center;
    flex-wrap: nowrap; width: 100%;
  }

  .path-item { text-align: center; flex: 1; padding: 0 6px; }

  .path-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(12px,3.5vw,18px);
    color: var(--gold); letter-spacing: 1px;
  }

  .path-key {
    font-size: clamp(8px,2.2vw,10px); letter-spacing: 2px;
    color: var(--dim); text-transform: uppercase; margin-top: 2px;
  }

  .divider {
    width: 1px; height: 32px; background: var(--dim);
    opacity: 0.3; align-self: center; flex-shrink: 0;
  }

  /* PROGRESS */
  .progress-wrap {
    position: relative; z-index: 2;
    width: 100%; max-width: 480px;
    margin-top: 24px;
    animation: fade-up 1s ease 1.1s both;
  }

  .progress-label {
    display: flex; justify-content: space-between;
    font-size: clamp(9px,2.5vw,10px); letter-spacing: 2px;
    color: var(--dim); text-transform: uppercase; margin-bottom: 8px;
  }

  .progress-bar {
    width: 100%; height: 2px;
    background: rgba(255,255,255,0.07); position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--ember), var(--gold));
    box-shadow: 0 0 10px var(--gold);
    transition: width 1s linear; position: relative;
  }

  .progress-dot {
    position: absolute; right: -4px; top: -3px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--corona);
    box-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold);
  }

  @keyframes fade-up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  body::after {
    content:''; position:fixed; inset:0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
    pointer-events:none; z-index:99;
  }

  .credit {
    position: relative; z-index: 2;
    margin-top: 24px; font-size: 10px;
    letter-spacing: 4px; color: var(--dim);
    opacity: 0.5; text-transform: uppercase;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="eclipse-wrap">
  <div class="corona">
    <div class="corona-ring"></div>
    <div class="corona-ring"></div>
    <div class="corona-ring"></div>
    <div class="sun-body"></div>
    <div class="moon-body"></div>
    <div class="crescent-glow"></div>
  </div>
</div>

<div class="header">
  <div class="label-top">Total Solar Eclipse</div>
  <div class="title">TOTALITY</div>
  <div class="subtitle">August 12 · 2026 · Path of Totality</div>
</div>

<div class="countdown">
  <div class="unit"><div class="unit-value" id="days">000</div><div class="unit-label">Days</div></div>
  <div class="separator">:</div>
  <div class="unit"><div class="unit-value" id="hours">00</div><div class="unit-label">Hours</div></div>
  <div class="separator">:</div>
  <div class="unit"><div class="unit-value" id="minutes">00</div><div class="unit-label">Mins</div></div>
  <div class="separator">:</div>
  <div class="unit"><div class="unit-value" id="seconds">00</div><div class="unit-label">Secs</div></div>
</div>

<div class="path-info">
  <div class="path-row">
    <div class="path-item"><div class="path-val">Spain · Iceland</div><div class="path-key">Totality Path</div></div>
    <div class="divider"></div>
    <div class="path-item"><div class="path-val">2 min 18 s</div><div class="path-key">Max Duration</div></div>
    <div class="divider"></div>
    <div class="path-item"><div class="path-val">~250 km</div><div class="path-key">Width</div></div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-label">
    <span>Now</span>
    <span id="pct-label">— % to eclipse</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%">
      <div class="progress-dot"></div>
    </div>
  </div>
</div>

<div class="credit">@SkywatcherCanada</div>

<script>
(function(){
  const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');
  let W,H,stars=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function initStars(){stars=[];const c=Math.floor(W*H/1400);for(let i=0;i<c;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4,a:Math.random(),da:(Math.random()-.5)*.003,gold:Math.random()<.06});}
  function draw(){ctx.clearRect(0,0,W,H);stars.forEach(s=>{s.a+=s.da;if(s.a<=0||s.a>=1)s.da*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.gold?`rgba(232,168,56,${s.a*.9})`:`rgba(200,210,230,${s.a})`;ctx.fill();});requestAnimationFrame(draw);}
  resize();initStars();draw();
  window.addEventListener('resize',()=>{resize();initStars();});
})();

const eclipseDate=new Date('2026-08-12T10:00:00Z');
const startDate=new Date('2025-01-01T00:00:00Z');
const totalMs=eclipseDate-startDate;
function pad(n,l=2){return String(n).padStart(l,'0');}
function update(){
  const now=new Date(),diff=eclipseDate-now;
  if(diff<=0)return;
  document.getElementById('days').textContent=pad(Math.floor(diff/86400000),3);
  document.getElementById('hours').textContent=pad(Math.floor((diff%86400000)/3600000));
  document.getElementById('minutes').textContent=pad(Math.floor((diff%3600000)/60000));
  const sEl=document.getElementById('seconds');
  sEl.classList.remove('tick');void sEl.offsetWidth;
  sEl.textContent=pad(Math.floor((diff%60000)/1000));sEl.classList.add('tick');
  const pct=Math.min(100,Math.max(0,((now-startDate)/totalMs)*100));
  document.getElementById('progress-fill').style.width=pct.toFixed(3)+'%';
  document.getElementById('pct-label').textContent=pct.toFixed(1)+'% to eclipse';
}
update();setInterval(update,1000);
</script>
</body>
</html>
